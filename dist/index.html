<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <meta http-equiv="X-UA-Compatible" content="ie=edge">\n    <title>Static Webpage</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            margin: 0;\n            padding: 0;\n            background-color: #f4f4f4;\n        }\n        header {\n            background: #35424a;\n            color: #ffffff;\n            padding: 10px 0;\n            text-align: center;\n        }\n        main {\n            padding: 20px;\n        }\n        footer {\n            background: #35424a;\n            color: #ffffff;\n            text-align: center;\n            padding: 10px 0;\n            position: fixed;\n            bottom: 0;\n            width: 100%;\n        }\n    </style>\n</head>\n<body>\n    <header>\n        <h1>Welcome to My Static Webpage</h1>\n    </header>\n    <main>\n        <p>This is a simple static webpage structure.</p>\n    </main>\n    <footer>\n        <p>Footer Content Here</p>\n    </footer>\n</body>\n</html>
